<!DOCTYPE html>
<html>
<head>
<title>Free Online Calculator</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}
.container{
width:350px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input,button{
width:90%;
padding:10px;
margin:5px;
}
button{
background:#ff7a00;
color:white;
border:none;
cursor:pointer;
}
h2{
color:#333;
}
</style>
</head>

<body>

<h1>Free Online Calculator Tools</h1>

<div class="container">
<h2>Percentage Calculator</h2>
<input id="p1" placeholder="Part">
<input id="p2" placeholder="Total">
<button onclick="percentage()">Calculate</button>
<p id="pResult"></p>
</div>

<div class="container">
<h2>Discount Calculator</h2>
<input id="d1" placeholder="Original Price">
<input id="d2" placeholder="Discount %">
<button onclick="discount()">Calculate</button>
<p id="dResult"></p>
</div>

<div class="container">
<h2>GST Calculator</h2>
<input id="g1" placeholder="Amount">
<input id="g2" placeholder="GST %">
<button onclick="gst()">Calculate</button>
<p id="gResult"></p>
</div>

<div class="container">
<h2>Age Calculator</h2>
<input id="birth" type="date">
<button onclick="age()">Calculate</button>
<p id="aResult"></p>
</div>

<div class="container">
<h2>EMI Calculator</h2>
<input id="loan" placeholder="Loan Amount">
<input id="rate" placeholder="Interest Rate %">
<input id="months" placeholder="Months">
<button onclick="emi()">Calculate</button>
<p id="eResult"></p>
</div>

<script>

function percentage(){
let part=document.getElementById("p1").value;
let total=document.getElementById("p2").value;
let result=(part/total)*100;
document.getElementById("pResult").innerHTML="Result: "+result.toFixed(2)+" %";
}

function discount(){
let price=document.getElementById("d1").value;
let disc=document.getElementById("d2").value;
let final=price-(price*disc/100);
document.getElementById("dResult").innerHTML="Final Price: "+final;
}

function gst(){
let amount=document.getElementById("g1").value;
let gst=amount*document.getElementById("g2").value/100;
let total=parseFloat(amount)+parseFloat(gst);
document.getElementById("gResult").innerHTML="Total with GST: "+total;
}

function age(){
let birth=new Date(document.getElementById("birth").value);
let today=new Date();
let age=today.getFullYear()-birth.getFullYear();
document.getElementById("aResult").innerHTML="Age: "+age+" years";
}

function emi(){
let P=document.getElementById("loan").value;
let r=document.getElementById("rate").value/12/100;
let n=document.getElementById("months").value;

let emi=(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
document.getElementById("eResult").innerHTML="Monthly EMI: "+emi.toFixed(2);
}

</script>

</body>
</html>
