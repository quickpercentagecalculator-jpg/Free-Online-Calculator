<!DOCTYPE html>
<html>
<head>
<title>GST Calculator</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:60px;
}
input, select, button{
    padding:8px;
    margin:8px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>GST Calculator</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="gst">
<option value="5">5%</option>
<option value="12">12%</option>
<option value="18">18%</option>
<option value="28">28%</option>
</select>

<br>

<button onclick="calculateGST()">Calculate</button>

<h3 id="gstAmount"></h3>
<h3 id="totalAmount"></h3>

<script>

function calculateGST(){

let amount = document.getElementById("amount").value;
let gst = document.getElementById("gst").value;

let gstValue = (amount * gst) / 100;
let total = Number(amount) + gstValue;

document.getElementById("gstAmount").innerHTML = "GST Amount: ₹ " + gstValue;
document.getElementById("totalAmount").innerHTML = "Total Price: ₹ " + total;

}

</script>

</body>
</html>
